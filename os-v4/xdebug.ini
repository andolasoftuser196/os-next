; Xdebug 3 configuration for OrangeScrum (PHP 8.3)
[xdebug]
; Do NOT declare zend_extension here — the package already loads Xdebug.
; Removing zend_extension prevents "Cannot load Xdebug - it was already loaded".
; Useful modes: develop for helpers, debug for step debugging
xdebug.mode=develop,debug
; Start debugging only when the trigger is present (use XDEBUG_TRIGGER) by default
xdebug.start_with_request=yes
; Automatically discover client host (works in many Docker setups)
xdebug.discover_client_host=1
; Default debug port
xdebug.client_port=9003
; Explicit client host for Docker on this machine (set from container network gateway)
xdebug.client_host=172.20.0.1
; Log file - use a writable path inside container
xdebug.log=/var/www/html/logs/xdebug.log

; Recommended: use XDEBUG_TRIGGER or browser extension to start a session
; To enable always-on set `xdebug.start_with_request=yes`
