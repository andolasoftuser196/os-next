[build]
# FrankenPHP static builder version (dunglas/frankenphp:static-builder-musl-<version>)
frankenphp_version = 1.12.1

# PHP version to compile into the binary
php_version = 8.3

# Docker image names (no tag — :latest is appended automatically)
base_image_name = orangescrum-cloud-base
app_image_name = orangescrum-cloud-app

# Disable UPX compression (1=no compress, 0=compress). Uncompressed is faster to build.
no_compress = 1

# Path to OrangeScrum V4 application source (relative to cloud-builder/)
app_source = ../apps/orangescrum-v4

# Number of old dist builds to keep (oldest are pruned after each build)
dist_keep_count = 3

# Binary name inside the dist packages
binary_name = osv4-prod

[runtime]
# UID/GID for the non-root container user
uid = 1000
gid = 1000

[php_extensions]
# Comma-separated list of PHP extensions compiled into the static binary.
# Changing this requires a base image rebuild (--rebuild-base).
list = bcmath,calendar,ctype,curl,dom,exif,fileinfo,filter,ftp,gd,iconv,intl,ldap,mbstring,opcache,openssl,pcntl,pdo,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,sysvmsg,sysvsem,sysvshm,tidy,tokenizer,xml,xmlreader,xmlwriter,zip,zlib,zstd
